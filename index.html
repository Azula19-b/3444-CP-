<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<title>QuickBytes Profile</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="app-title">QuickBytes</div>

<div class="profile-card">

<div class="profile-header">

<img class="avatar" src="https://i.pravatar.cc/150">

<h2>Jordan Davis</h2>
<p class="email">jordan.davis@email.com</p>

</div>


<div class="section">

<h3>Dietary Preferences</h3>

<div class="preferences">

<div class="pref">🌙 Halal</div>
<div class="pref">🌱 Vegan</div>
<div class="pref">🌾 Gluten-Free</div>
<div class="pref">💪 High Protein</div>

</div>

</div>


<div class="section">

<h3>Settings</h3>

<div class="menu">

<div class="menu-item">
<i class="fa fa-user"></i>
<span>Edit Profile</span>
<i class="fa fa-chevron-right arrow"></i>
</div>

<div class="menu-item">
<i class="fa fa-heart"></i>
<span>Saved Favorites</span>
<i class="fa fa-chevron-right arrow"></i>
</div>

<div class="menu-item">
<i class="fa fa-leaf"></i>
<span>Dietary Preferences</span>
<i class="fa fa-chevron-right arrow"></i>
</div>

<div class="menu-item">
<i class="fa fa-bell"></i>
<span>Notifications</span>
<i class="fa fa-chevron-right arrow"></i>
</div>

<div class="menu-item">
<i class="fa fa-circle-question"></i>
<span>Help / FAQ</span>
<i class="fa fa-chevron-right arrow"></i>
</div>

</div>

</div>


<button id="logout">Logout</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
